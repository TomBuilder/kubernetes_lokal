replicaCount: 1

image:
  repository: nginx
  tag: "1.27"
  pullPolicy: IfNotPresent
  pullSecrets: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: app-a.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

app:
  displayName: "Anwendung A"
  message: "Standardinstanz im gemeinsamen vCluster"
  database:
    secretName: app-a-db
    connectionStringKey: connectionString

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  mountPath: /usr/share/nginx/html/data

resources: {}

worker:
  enabled: true
  replicaCount: 1
  image:
    repository: app-a-worker
    tag: "0.1.0"
    pullPolicy: IfNotPresent
    pullSecrets: []
  version: "0.1.0"
  intervalSeconds: 5
  extraEnv: {}
  secretEnv: []
  mountRootVolume: false
  mountRootPath: /mounts/root
  mountVolumeSource: pvc
  hostPath: ""
  hostPathType: DirectoryOrCreate
  keda:
    enabled: false
    pollingInterval: 10
    cooldownPeriod: 30
    minReplicaCount: 0
    maxReplicaCount: 10
    idleReplicaCount: 0
    host: host.docker.internal
    port: "5432"
    dbName: app
    userName: postgres
    secretName: app-a-worker-db
    passwordSecretKey: postgresPassword
    sslmode: disable
    query: "SELECT 0"
    targetQueryValue: "1"
    activationTargetQueryValue: "0"
  resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
