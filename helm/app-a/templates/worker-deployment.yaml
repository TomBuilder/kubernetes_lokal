{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-a.workerFullname" . }}
  labels:
    {{- include "app-a.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app-a.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app-a.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          env:
            - name: Worker__TesterName
              value: {{ .Release.Name | quote }}
            - name: Worker__Version
              value: {{ .Values.worker.version | quote }}
            - name: Worker__IntervalSeconds
              value: {{ .Values.worker.intervalSeconds | quote }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- end }}
